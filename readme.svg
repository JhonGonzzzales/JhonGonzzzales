<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <title>Órbita de Tecnologías Compacta</title>
  
  <defs>
    <animateTransform id="anim-1" href="#orbit-1" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="12s" repeatCount="indefinite" />
    <animateTransform id="anim-2" href="#orbit-2" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite" />
    <animateTransform id="anim-3" href="#orbit-3" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="28s" repeatCount="indefinite" />
  </defs>

  <!-- Anillos -->
  <circle cx="160" cy="160" r="45" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <circle cx="160" cy="160" r="85" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <circle cx="160" cy="160" r="125" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- === Órbita 1 === -->
  <g id="orbit-1">
    <image x="143" y="98" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/flutter-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 115" to="-360 160 115" dur="12s" repeatCount="indefinite" />
    </image>
    <image x="143" y="188" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/dart-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 205" to="-360 160 205" dur="12s" repeatCount="indefinite" />
    </image>
  </g>

  <!-- === Órbita 2 === -->
  <g id="orbit-2">
    <image x="58" y="143" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/javascript-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 75 160" to="-360 75 160" dur="20s" repeatCount="indefinite" />
    </image>
    <image x="143" y="58" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/html5-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 75" to="-360 160 75" dur="20s" repeatCount="indefinite" />
    </image>
    <image x="228" y="143" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/css3-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 245 160" to="-360 245 160" dur="20s" repeatCount="indefinite" />
    </image>
  </g>

  <!-- === Órbita 3 === -->
  <g id="orbit-3">
    <image x="18" y="143" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/sqlite-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 35 160" to="-360 35 160" dur="28s" repeatCount="indefinite" />
    </image>
    <image x="223" y="52" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/postgresql-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 240 69" to="-360 240 69" dur="28s" repeatCount="indefinite" />
    </image>
    <image x="223" y="234" width="34" height="34" href="https://raw.githubusercontent.com/JhonGonzzzales/JhonGonzzzales/main/firebase-plain.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 240 251" to="-360 240 251" dur="28s" repeatCount="indefinite" />
    </image>
  </g>

</svg>
