<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Órbita de Tecnologías Compacta</title>
  
  <defs>
    <!-- Animaciones de rotación con eje en (160, 160) -->
    <animateTransform xlink:href="#orbit-1" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="12s" repeatCount="indefinite" />
    <animateTransform xlink:href="#orbit-2" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite" />
    <animateTransform xlink:href="#orbit-3" attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="28s" repeatCount="indefinite" />
  </defs>

  <!-- Anillos de órbita más estrechos (Radio: 45, 85, 125) -->
  <circle cx="160" cy="160" r="45" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <circle cx="160" cy="160" r="85" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <circle cx="160" cy="160" r="125" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- === Órbita 1 (Anillo interior cerrado: Mobile) === -->
  <g id="orbit-1">
    <!-- Flutter -->
    <image x="143" y="98" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/flutter/flutter-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 115" to="-360 160 115" dur="12s" repeatCount="indefinite" />
    </image>
    <!-- Dart -->
    <image x="143" y="188" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/dart/dart-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 205" to="-360 160 205" dur="12s" repeatCount="indefinite" />
    </image>
  </g>

  <!-- === Órbita 2 (Anillo intermedio: Web Frontend) === -->
  <g id="orbit-2">
    <!-- JS -->
    <image x="58" y="143" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 75 160" to="-360 75 160" dur="20s" repeatCount="indefinite" />
    </image>
    <!-- HTML5 -->
    <image x="143" y="58" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 160 75" to="-360 160 75" dur="20s" repeatCount="indefinite" />
    </image>
    <!-- CSS3 -->
    <image x="228" y="143" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 245 160" to="-360 245 160" dur="20s" repeatCount="indefinite" />
    </image>
  </g>

  <!-- === Órbita 3 (Anillo exterior: Backend/DB) === -->
  <g id="orbit-3">
    <!-- SQLite -->
    <image x="18" y="143" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/sqlite/sqlite-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 35 160" to="-360 35 160" dur="28s" repeatCount="indefinite" />
    </image>
    <!-- PostgreSQL -->
    <image x="223" y="52" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 240 69" to="-360 240 69" dur="28s" repeatCount="indefinite" />
    </image>
    <!-- Firebase -->
    <image x="223" y="234" width="34" height="34" xlink:href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/firebase/firebase-plain.svg">
        <animateTransform attributeName="transform" type="rotate" from="0 240 251" to="-360 240 251" dur="28s" repeatCount="indefinite" />
    </image>
  </g>

</svg>
